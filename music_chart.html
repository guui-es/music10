<head>

<title>Guui Music Chart 10</title>

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

  /* Header */
  .header{position:relative;flex:none;background:linear-gradient(135deg,#4FACFE 0%,#2A8CFE 55%,#00C6FB 100%);overflow:hidden;}
  .hc1{position:absolute;right:-24px;top:-28px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.16)}
  .hc2{position:absolute;right:80px;top:50px;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.13)}

  .status-bar{position:relative;display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0;color:#fff;font-size:12px;font-weight:600;}
  .header-content{position:relative;padding:8px 20px 0;color:#fff}
  .header-title{font-family:'Poppins',sans-serif;font-weight:800;line-height:1}
  .header-sub{opacity:.92;margin-top:4px}

  .tab-btn.active{background:#fff;color:#2A8CFE;}
  .tab-btn:active{transform:scale(.93)}
  .admin-btn{margin-left:auto;border:none;cursor:pointer;border-radius:999px;font-weight:700;font-family:'Noto Sans KR',sans-serif;background:rgba(255,255,255,.25);color:#fff;transition:background .18s,transform .1s;}
  .admin-btn:active{transform:scale(.93)}

  /* Song list */
  .song-list{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
  .song-row{display:flex;align-items:center;border-bottom:1px solid #EAF1F8;transition:background .15s;animation:fadeIn .22s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .song-row:active{background:rgba(42,140,254,.05)}
  .rank-wrap{flex:none;text-align:center}
  .rank-num{font-family:'Jua',sans-serif;line-height:1}
  .rank-change{font-size:10px;margin-top:1px;font-weight:700}
  .cover-btn{flex:none;border-radius:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:transform .1s;position:relative;}
  .cover-btn:active{transform:scale(.94)}
  .cover-btn .yt-badge{position:absolute;bottom:3px;right:3px;background:#FF0000;border-radius:3px;font-size:7px;color:#fff;padding:1px 3px;font-weight:700;line-height:1.2;}
  .song-info{flex:1;min-width:0}
  .song-title{font-weight:700;color:#23303F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .song-artist{color:#94A3B4;margin-top:2px}
  .like-btn{display:flex;align-items:center;border:none;cursor:pointer;border-radius:999px;transition:transform .1s,background .2s;}
  .like-btn:active{transform:scale(.9)}
  .like-btn .count{font-weight:700}

  /* YouTube hidden iframe */
  #ytFrame{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;pointer-events:none;}

  /* Player */
  .player{flex:none;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border-top:1px solid rgba(42,140,254,.18);display:flex;flex-direction:column;justify-content:center;}
  .player-main{display:flex;align-items:center;}
  .player-cover{flex:none;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:background .3s;overflow:hidden;position:relative;}
  .player-cover img{width:100%;height:100%;object-fit:cover;border-radius:14px;}
  .player-info{flex:1;min-width:0}
  .player-title{font-weight:700;color:#23303F;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .player-artist{color:#94A3B4;margin-top:2px}
  .progress-wrap{margin-top:6px;position:relative;height:14px;display:flex;align-items:center;cursor:pointer;}
  .progress-track{width:100%;height:5px;border-radius:999px;background:#E4EEF8;position:relative;}
  .progress-fill{height:5px;border-radius:999px;background:linear-gradient(90deg,#2A8CFE,#00C6FB);width:0%;transition:width .3s linear;}
  .progress-time{display:flex;justify-content:space-between;margin-top:3px;}

  .ctrl{display:flex;align-items:center;}

  .play-btn{flex:none;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#2A8CFE,#00C6FB);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 5px 14px rgba(42,140,254,.4);transition:transform .1s;}

  /* ── 관리자 모달 ── */

  }
  @media(min-width:1024px) and (max-width:1439px){

    .ctrl{gap:9px}.prev-btn,.next-btn{width:36px;height:36px;font-size:15px}.play-btn{width:50px;height:50px;font-size:19px}
  }
  @media(min-width:1440px){
    body{display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 25% 20%,#DFF0FF,#C8DEFF 55%,#B8CEF8);}

    .cover-btn{width:60px;height:60px;font-size:29px}.song-title{font-size:16px}.song-artist{font-size:13px}

</style>

<script>
// ── YouTube IFrame API ────────────────────────────────
var ytPlayer, ytReady = false, ytPendingId = null, ytDuration = 0, ytTimer = null;

function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('ytFrame', {
    height:'1', width:'1',
    playerVars:{autoplay:0, controls:0, playsinline:1},
    events:{
      onReady: () => { ytReady = true; if(ytPendingId){ loadYT(ytPendingId); ytPendingId=null; } },
      onStateChange: e => {
        if(e.data === YT.PlayerState.PLAYING){
          ytDuration = ytPlayer.getDuration();
          document.getElementById('timeTot').textContent = fmt(ytDuration);
          clearInterval(ytTimer);
          ytTimer = setInterval(tickProgress, 500);
          playing.on = true;
        } else if(e.data === YT.PlayerState.PAUSED){
          clearInterval(ytTimer); playing.on = false;
        } else if(e.data === YT.PlayerState.ENDED){
          clearInterval(ytTimer); playing.on = false; playNext(1);
        }
        updatePlayerBtn();
      }
    }
  });
}

// Load YouTube IFrame API script
(function(){
  var s = document.createElement('script');
  s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
})();

function loadYT(videoId) {
  if(!ytReady){ ytPendingId = videoId; return; }
  ytPlayer.loadVideoById(videoId);
}
function fmt(sec){
  if(!sec||isNaN(sec))return'0:00';
  const m=Math.floor(sec/60),s=Math.floor(sec%60);
  return`${m}:${s<10?'0'+s:s}`;
}
function tickProgress(){
  if(!ytPlayer||!ytPlayer.getCurrentTime)return;
  const cur=ytPlayer.getCurrentTime(), dur=ytPlayer.getDuration()||1;
  document.getElementById('progressFill').style.width=(cur/dur*100)+'%';
  document.getElementById('timeCur').textContent=fmt(cur);
}

// ── 유틸: YouTube URL → videoId ──────────────────────
function parseYTId(url){
  try {
    const u = new URL(url.trim());
    if(u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
    return u.searchParams.get('v') || '';
  } catch { return ''; }
}

// ── 데이터 ────────────────────────────────────────────
const EMOJIS = ['🦈','🐻','⭐','🌸','🛑','🙆','☀️','🚲','🌈','☂️','🎵','🎸','🎹','🥁','🎺','🎻','🦁','🐬','🌻','🍭'];
const COLORS = [

  ['#FAD961','#F76B1C'],['#4FACFE','#00F2FE'],['#FA709A','#FEE140'],
  ['#30CFD0','#5A4FCF'],['#667EEA','#764BA2'],['#F7971E','#FFD200'],
];

  {id:'shark',   title:'상어가족',          artist:'핑크퐁',       emoji:'🦈', c1:'#36D1DC', c2:'#5B86E5', likes:58455, ord:0, liked:false, isNew:false, ytId:'XqZsoesa55w'},
  {id:'bear',    title:'곰 세 마리',         artist:'동요나라',     emoji:'🐻', c1:'#F6D365', c2:'#FDA085', likes:67245, ord:1, liked:false, isNew:false, ytId:''},
  {id:'star',    title:'반짝반짝 작은 별',    artist:'키즈싱어즈',   emoji:'⭐', c1:'#A18CD1', c2:'#FBC2EB', likes:44971, ord:2, liked:false, isNew:true,  ytId:''},
  {id:'flower',  title:'모두 다 꽃이야',      artist:'우리합창단',   emoji:'🌸', c1:'#FF9A9E', c2:'#FECFEF', likes:41921, ord:3, liked:false, isNew:true,  ytId:''},
  {id:'stop',    title:'그대로 멈춰라',       artist:'율동친구들',   emoji:'🛑', c1:'#FF6A88', c2:'#FF99AC', likes:71090, ord:4, liked:false, isNew:false, ytId:''},
  {id:'head',    title:'머리 어깨 무릎 발',    artist:'체조교실',     emoji:'🙆', c1:'#43E97B', c2:'#38F9D7', likes:39210, ord:5, liked:false, isNew:true,  ytId:''},
  {id:'sun',     title:'둥근 해가 떴습니다',   artist:'아침동요',     emoji:'☀️', c1:'#FAD961', c2:'#F76B1C', likes:35120, ord:6, liked:false, isNew:false, ytId:''},
  {id:'bike',    title:'자전거',             artist:'신나는음악',   emoji:'🚲', c1:'#4FACFE', c2:'#00F2FE', likes:29870, ord:7, liked:false, isNew:true,  ytId:''},
  {id:'rainbow', title:'무지개',             artist:'컬러키즈',     emoji:'🌈', c1:'#FA709A', c2:'#FEE140', likes:33450, ord:8, liked:false, isNew:false, ytId:''},
  {id:'umbrella',title:'우산',               artist:'빗방울합창단', emoji:'☂️', c1:'#30CFD0', c2:'#5A4FCF', likes:26540, ord:9, liked:false, isNew:true,  ytId:''},
];

let playing = {id:null, on:false}, currentTab = 'hot';
let selEmoji = EMOJIS[0], selColor = 0;

function getList(){
  const l=[...songs];
  if(currentTab==='hot')   return l.sort((a,b)=>b.likes-a.likes||a.ord-b.ord);
  if(currentTab==='new')   return l.filter(s=>s.isNew).concat(l.filter(s=>!s.isNew));
  if(currentTab==='liked') return l.filter(s=>s.liked).sort((a,b)=>b.likes-a.likes);
  return l;
}
function rankColor(r){return r===1?'#FF9F1C':r===2?'#8CA0B3':r===3?'#E08E45':'#B0B8C1'}

function toggleLike(id){
  const s=songs.find(x=>x.id===id); if(!s)return;
  s.liked=!s.liked; s.likes+=s.liked?1:-1; render();
}

function playSong(id){
  const s=songs.find(x=>x.id===id); if(!s)return;
  if(playing.id===id){
    if(ytPlayer&&ytReady){ playing.on?ytPlayer.pauseVideo():ytPlayer.playVideo(); }
  } else {
    playing={id,on:false};
    if(s.ytId){ loadYT(s.ytId); }
    else { playing.on=false; }
  }
  render();
}

function playNext(dir){
  const list=getList(); if(!list.length)return;
  const idx=list.findIndex(s=>s.id===playing.id);
  const next=list[(idx+dir+list.length)%list.length];
  playSong(next.id);
}

function updatePlayerBtn(){
  document.getElementById('playBtn').textContent = playing.on ? '⏸' : '▶';
  render();
}

function render(){
  const list=getList();
  const container=document.getElementById('songList');
  if(currentTab==='liked'&&list.length===0){
    container.innerHTML=`<div style="text-align:center;padding:60px 20px;color:#B0B8C1;font-size:14px">❤️ 좋아요한 노래가 없어요!<br>노래 옆 하트를 눌러보세요</div>`;
  } else {
    container.innerHTML=list.map((s,i)=>{
      const rank=i+1, isP=playing.id===s.id;
      const thumb = s.ytId ? `https://img.youtube.com/vi/${s.ytId}/default.jpg` : '';
      return`<div class="song-row">
        <div class="rank-wrap">
          <div class="rank-num" style="color:${rankColor(rank)}">${rank}</div>
          ${s.isNew?`<div class="rank-change" style="color:#2A8CFE">NEW</div>`:''}
        </div>
        <button class="cover-btn" style="background:linear-gradient(135deg,${s.c1},${s.c2});box-shadow:${isP?`0 0 0 3px #fff,0 0 0 5px ${s.c1}`:''}" data-play="${s.id}">
          ${thumb&&!isP?`<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;border-radius:13px;" onerror="this.style.display='none'">`:`<span>${isP&&playing.on?'⏸':s.emoji}</span>`}
          ${s.ytId?`<span class="yt-badge">YT</span>`:''}
        </button>
        <div class="song-info">
          <div class="song-title" style="color:${isP?'#2A8CFE':'#23303F'}">${s.title}</div>
          <div class="song-artist">${s.artist}</div>
        </div>
        <button class="like-btn" style="background:${s.liked?'#FFE3EC':'#EEF2F7'}" data-like="${s.id}">
          <span class="heart">${s.liked?'❤️':'🤍'}</span>
          <span class="count" style="color:${s.liked?'#FF4D79':'#9AA5B1'}">${s.likes.toLocaleString('ko-KR')}</span>
        </button>
      </div>`;
    }).join('');
  }
  container.querySelectorAll('[data-like]').forEach(b=>b.addEventListener('click',()=>toggleLike(b.dataset.like)));
  container.querySelectorAll('[data-play]').forEach(b=>b.addEventListener('click',()=>playSong(b.dataset.play)));

  // 플레이어
  const now=playing.id?songs.find(x=>x.id===playing.id):null;
  const cover=document.getElementById('playerCover');
  if(now){
    cover.style.background=`linear-gradient(135deg,${now.c1},${now.c2})`;
    const thumb=now.ytId?`https://img.youtube.com/vi/${now.ytId}/mqdefault.jpg`:'';
    cover.innerHTML=thumb?`<img src="${thumb}" style="width:100%;height:100%;object-fit:cover;border-radius:13px;" onerror="this.outerHTML='<span>${now.emoji}</span>'">`:`<span>${now.emoji}</span>`;
    document.getElementById('playerTitle').textContent=now.title;
    document.getElementById('playerArtist').textContent=now.artist;
    document.getElementById('playBtn').textContent=playing.on?'⏸':'▶';
  } else {
    cover.style.background='linear-gradient(135deg,#E0E7F0,#CBD5E1)';
    cover.innerHTML='<span>🎵</span>';
    document.getElementById('playerTitle').textContent='재생할 노래를 골라보세요';
    document.getElementById('playerArtist').textContent='';
    document.getElementById('playBtn').textContent='▶';
    document.getElementById('progressFill').style.width='0%';
    document.getElementById('timeCur').textContent='0:00';
    document.getElementById('timeTot').textContent='0:00';
  }
}

// ── 이벤트 ────────────────────────────────────────────
document.getElementById('playBtn').addEventListener('click',()=>{
  if(!playing.id)return;
  if(ytPlayer&&ytReady){ playing.on?ytPlayer.pauseVideo():ytPlayer.playVideo(); }
});
document.getElementById('prevBtn').addEventListener('click',()=>playNext(-1));
document.getElementById('nextBtn').addEventListener('click',()=>playNext(1));
document.getElementById('progressWrap').addEventListener('click',e=>{
  if(!ytPlayer||!ytReady||!ytPlayer.getDuration)return;
  const rect=e.currentTarget.getBoundingClientRect();
  const ratio=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  ytPlayer.seekTo(ratio*ytPlayer.getDuration(),true);
});
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    currentTab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); render();
  });
});

// ── 관리자 모달 ───────────────────────────────────────
function openAdmin(){
  document.getElementById('modalBg').classList.remove('hidden');
  renderMgmt();
}
function closeAdmin(){ document.getElementById('modalBg').classList.add('hidden'); }
document.getElementById('adminBtn').addEventListener('click',openAdmin);
document.getElementById('modalClose').addEventListener('click',closeAdmin);
document.getElementById('modalBg').addEventListener('click',e=>{ if(e.target===e.currentTarget)closeAdmin(); });

// 이모지 팔레트
const emojiRow=document.getElementById('emojiRow');
EMOJIS.forEach(em=>{
  const s=document.createElement('span');
  s.className='emoji-opt'+(em===selEmoji?' sel':'');
  s.textContent=em;
  s.addEventListener('click',()=>{
    selEmoji=em;
    emojiRow.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));
    s.classList.add('sel');
  });
  emojiRow.appendChild(s);
});

// 색상 팔레트
const colorRow=document.getElementById('colorRow');
COLORS.forEach(([c1,c2],i)=>{
  const d=document.createElement('div');
  d.className='color-opt'+(i===selColor?' sel':'');
  d.style.background=`linear-gradient(135deg,${c1},${c2})`;
  d.addEventListener('click',()=>{
    selColor=i;
    colorRow.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel'));
    d.classList.add('sel');
  });
  colorRow.appendChild(d);
});

// YouTube URL 실시간 검증
document.getElementById('f-url').addEventListener('input',e=>{
  const id=parseYTId(e.target.value);
  const prev=document.getElementById('ytPreview');
  if(id){ prev.style.display='flex'; prev.className='yt-preview ok'; prev.textContent='✅ 유효한 YouTube 링크예요! (ID: '+id+')'; }
  else if(e.target.value.trim()){ prev.style.display='flex'; prev.className='yt-preview'; prev.textContent='❌ 유효한 YouTube 링크가 아니에요.'; }
  else { prev.style.display='none'; }
});

// 곡 추가
document.getElementById('addBtn').addEventListener('click',()=>{
  const url=document.getElementById('f-url').value.trim();
  const title=document.getElementById('f-title').value.trim();
  const artist=document.getElementById('f-artist').value.trim();
  if(!title||!artist){ alert('곡 제목과 아티스트를 입력해주세요!'); return; }
  const ytId=url?parseYTId(url):'';
  if(url&&!ytId){ alert('유효한 YouTube 링크를 입력해주세요!'); return; }
  const [c1,c2]=COLORS[selColor];
  songs.push({
    id:'song_'+Date.now(), title, artist, emoji:selEmoji,
    c1, c2, likes:0, ord:songs.length, liked:false, isNew:true, ytId
  });
  document.getElementById('f-url').value='';
  document.getElementById('f-title').value='';
  document.getElementById('f-artist').value='';
  document.getElementById('ytPreview').style.display='none';
  render(); renderMgmt();
  alert(`✅ "${title}" 곡이 추가됐어요!`);
});

function renderMgmt(){
  const el=document.getElementById('mgmtList');
  el.innerHTML=songs.map(s=>`
    <div class="mgmt-row">
      <div class="mgmt-cover" style="background:linear-gradient(135deg,${s.c1},${s.c2})">${s.emoji}</div>
      <div class="mgmt-info">
        <div class="mgmt-title">${s.title}</div>
        <div class="mgmt-artist">${s.artist}</div>
        <div class="mgmt-yt">${s.ytId?'▶ youtu.be/'+s.ytId:'YouTube 미등록'}</div>
      </div>
      <button class="del-btn" data-del="${s.id}">🗑</button>
    </div>`).join('');
  el.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click',()=>{
    if(!confirm('정말 삭제할까요?'))return;
    songs=songs.filter(x=>x.id!==b.dataset.del);
    if(playing.id===b.dataset.del){ playing={id:null,on:false}; if(ytPlayer&&ytReady)ytPlayer.stopVideo(); }
    render(); renderMgmt();
  }));
}

// 시계
function updateTime(){const d=new Date(),h=d.getHours(),m=d.getMinutes();document.getElementById('nowTime').textContent=`${h}:${m<10?'0'+m:m}`;}
updateTime(); setInterval(updateTime,30000);

render();
</script>
